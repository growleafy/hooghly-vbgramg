<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VB-G RAM G Planning Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar { background: #003366; }
        .navbar-brand { color: #fff !important; font-weight: bold; }
        .header-stats { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2rem; font-weight: 700; color: #003366; }
        .work-checkbox { transform: scale(1.2); }
        .btn-generate { background: #003366; color: white; border: none; padding: 10px 30px; border-radius: 8px; }
        .btn-generate:hover { background: #002244; color: white; }
        .footer { margin-top: 40px; padding: 20px; background: white; border-top: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <span class="navbar-brand"><i class="fas fa-book-open me-2"></i>VB-G RAM G Portal</span>
            <div class="ms-auto">
                <span class="badge bg-warning text-dark">Public</span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Stats -->
        <div class="row header-stats">
            <div class="col-md-3 text-center">
                <div class="stat-number" id="totalWorks">0</div>
                <div>Total Works</div>
            </div>
            <div class="col-md-3 text-center">
                <div class="stat-number">4</div>
                <div>Master Categories</div>
            </div>
            <div class="col-md-3 text-center">
                <div class="stat-number">29</div>
                <div>Sub-categories</div>
            </div>
            <div class="col-md-3 text-center">
                <div class="stat-number" id="selectedCount">0</div>
                <div>Selected Works</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="row mt-4">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search works...">
            </div>
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select">
                    <option value="">All Categories</option>
                    <option value="1">Water Security</option>
                    <option value="2">Core Rural Infrastructure</option>
                    <option value="3">Livelihood Infrastructure</option>
                    <option value="4">Disaster Preparedness</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="beneficiaryFilter" class="form-select">
                    <option value="">All Beneficiaries</option>
                    <option value="Individual">Individual</option>
                    <option value="Community">Community</option>
                    <option value="Groups">Groups</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="generateHandbook()">
                    <i class="fas fa-file-pdf"></i> Generate PDF
                </button>
            </div>
        </div>

        <!-- Works Table -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="table-responsive">
                    <table id="worksTable" class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th style="width: 60px;">S.No</th>
                                <th>Work Name</th>
                                <th>Category</th>
                                <th>Sub-category</th>
                                <th>Beneficiary</th>
                                <th style="width: 50px;">
                                    <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
                                </th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Ministry of Rural Development, Government of India. All rights reserved.</p>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        // Configuration – replace with your actual endpoints
        const HASURA_URL = 'https://your-subdomain.nhost.run/v1/graphql';
        const ADMIN_SECRET = 'your-nhost-admin-secret'; // Only needed if Hasura is protected
        const FLASK_URL = 'https://vbgramg-backend-xxxx.nhost.run/api/generate-handbook';

        let worksData = [];
        let selectedWorks = new Set();

        // GraphQL query to fetch all works with their relationships
        const QUERY = `
            query GetAllWorks {
                permissible_works(order_by: {vb_gram_g_number: asc}) {
                    id
                    vb_gram_g_number
                    name
                    beneficiary_type
                    work_type {
                        name
                        sub_category {
                            name
                            master_category {
                                id
                                name
                            }
                        }
                    }
                }
            }
        `;

        // Fetch data from Hasura
        async function fetchWorks() {
            try {
                const response = await fetch(HASURA_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-hasura-admin-secret': ADMIN_SECRET
                    },
                    body: JSON.stringify({ query: QUERY })
                });
                const result = await response.json();
                if (result.errors) {
                    console.error('GraphQL errors:', result.errors);
                    return;
                }
                worksData = result.data.permissible_works;
                document.getElementById('totalWorks').textContent = worksData.length;
                renderTable(worksData);
            } catch (err) {
                console.error('Failed to fetch works:', err);
                alert('Could not load works. Please check your connection and credentials.');
            }
        }

        // Render DataTable
        let dataTable = null;

        function renderTable(data) {
            if (dataTable) {
                dataTable.destroy();
            }
            
            const tbody = $('#worksTable tbody');
            tbody.empty();

            data.forEach(work => {
                const cat = work.work_type?.sub_category?.master_category?.name || 'N/A';
                const sub = work.work_type?.sub_category?.name || 'N/A';
                const type = work.work_type?.name || 'N/A';
                const isChecked = selectedWorks.has(work.id);
                const row = `
                    <tr>
                        <td>${work.vb_gram_g_number}</td>
                        <td><strong>${work.name}</strong></td>
                        <td>${cat}</td>
                        <td>${sub}</td>
                        <td><span class="badge ${work.beneficiary_type === 'Community' ? 'bg-primary' : work.beneficiary_type === 'Individual' ? 'bg-success' : 'bg-info'}">${work.beneficiary_type || 'N/A'}</span></td>
                        <td>
                            <input type="checkbox" class="work-checkbox" 
                                   data-id="${work.id}" 
                                   ${isChecked ? 'checked' : ''}
                                   onchange="toggleWork(${work.id}, this)">
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });

            dataTable = $('#worksTable').DataTable({
                pageLength: 25,
                lengthMenu: [10, 25, 50, 100],
                order: [[0, 'asc']],
                columnDefs: [
                    { orderable: false, targets: [5] }
                ],
                language: {
                    search: "Filter:",
                    lengthMenu: "Show _MENU_ entries"
                }
            });

            updateSelectedCount();
        }

        // Filter handlers
        $('#searchInput').on('keyup', function() {
            dataTable.search(this.value).draw();
        });

        $('#categoryFilter').on('change', function() {
            const catId = parseInt(this.value);
            let filtered = worksData;
            if (catId) {
                filtered = worksData.filter(w => w.work_type?.sub_category?.master_category?.id === catId);
            }
            // Re-apply beneficiary filter
            const ben = $('#beneficiaryFilter').val();
            if (ben) {
                filtered = filtered.filter(w => w.beneficiary_type === ben);
            }
            renderTable(filtered);
        });

        $('#beneficiaryFilter').on('change', function() {
            const ben = this.value;
            let filtered = worksData;
            if (ben) {
                filtered = filtered.filter(w => w.beneficiary_type === ben);
            }
            const catId = parseInt($('#categoryFilter').val());
            if (catId) {
                filtered = filtered.filter(w => w.work_type?.sub_category?.master_category?.id === catId);
            }
            renderTable(filtered);
        });

        // Selection logic
        function toggleWork(id, checkbox) {
            if (checkbox.checked) {
                selectedWorks.add(id);
            } else {
                selectedWorks.delete(id);
            }
            updateSelectedCount();
        }

        function toggleAll(masterCheckbox) {
            const checkboxes = document.querySelectorAll('.work-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = masterCheckbox.checked;
                const id = parseInt(cb.dataset.id);
                if (masterCheckbox.checked) {
                    selectedWorks.add(id);
                } else {
                    selectedWorks.delete(id);
                }
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedWorks.size;
        }

        // Generate Handbook
        async function generateHandbook() {
            if (selectedWorks.size === 0) {
                alert('Please select at least one work.');
                return;
            }

            const workIds = Array.from(selectedWorks);
            document.querySelector('.btn-generate').disabled = true;
            document.querySelector('.btn-generate').innerHTML = '<span class="spinner-border spinner-border-sm"></span> Generating...';

            try {
                const response = await fetch(FLASK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ work_ids: workIds })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${response.status} - ${errorText}`);
                }

                // Download the PDF
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `VB-GRAM-G_Handbook_${new Date().toISOString().slice(0,10)}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

            } catch (err) {
                console.error('PDF generation failed:', err);
                alert('Failed to generate handbook: ' + err.message);
            } finally {
                document.querySelector('.btn-generate').disabled = false;
                document.querySelector('.btn-generate').innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF';
            }
        }

        // Initial load
        $(document).ready(function() {
            fetchWorks();
        });
    </script>
</body>
</html>
